<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Principles Machine</title>
<meta name="description" content="Click a gear to learn a constitutional principle. Seven gears, seven principles, one machine.">
<style>
  :root{
    --navy:#1B2A4A;
    --navy-deep:#10203C;
    --steel:#2E74B5;
    --crimson:#B23A48;
    --brass:#C9A227;
    --green:#2F7D4F;
    --paper:#F5F7FA;
    --white:#FFFFFF;
    --ink:#22283A;
    --slate:#5B6770;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,p{margin:0;}
  button{font-family:inherit;cursor:pointer;}
  img{max-width:100%;display:block;}

  .app{max-width:1000px;margin:0 auto;overflow-x:hidden;}

  /* ---------- Header / hero ---------- */
  .hero{
    position:relative;
    background:linear-gradient(155deg,var(--navy) 0%,var(--navy-deep) 100%);
    color:var(--white);
    padding:22px 20px 26px;
    overflow:hidden;
  }
  .hero-photo{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    opacity:.34;
    mix-blend-mode:luminosity;
  }
  .hero-scrim{
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(16,32,60,.55) 0%, rgba(16,32,60,.86) 100%);
  }
  .hero-inner{position:relative; z-index:1;}
  .hero-eyebrow{
    font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--brass); font-weight:700; margin-bottom:6px;
  }
  .hero h1{font-size:clamp(24px,5vw,34px); font-weight:800; letter-spacing:.01em;}
  .hero p.sub{margin-top:6px; font-size:15px; color:#D9E2F1; max-width:52ch;}

  .mode-toggle{
    margin-top:16px;
    display:inline-flex;
    background:rgba(255,255,255,.09);
    border:1px solid rgba(255,255,255,.28);
    border-radius:999px;
    padding:4px;
    gap:2px;
  }
  .mode-toggle button{
    border:none; background:transparent; color:#D9E2F1;
    font-size:17px; font-weight:700; padding:12px 24px; border-radius:999px;
    transition:background .2s,color .2s;
    min-height:48px;
  }
  @media (max-width:480px){
    .mode-toggle button{font-size:15.5px; padding:10px 16px; min-height:44px;}
  }
  .mode-toggle button[aria-pressed="true"]{
    background:var(--brass); color:var(--navy-deep);
  }
  .mode-toggle button:focus-visible{outline:2px solid var(--white); outline-offset:2px;}

  /* ---------- Stage ---------- */
  .stage{position:relative; padding:26px 16px 10px;}

  .progress-row{
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-bottom:6px; flex-wrap:wrap;
  }
  .progress-dot{
    width:11px;height:11px;border-radius:50%;
    background:#D7DEE8; border:2px solid #C3CCDA;
    transition:background .25s, border-color .25s;
  }
  .progress-dot.done{background:var(--brass); border-color:#A9820F;}
  .progress-label{font-size:12.5px; color:var(--slate); font-weight:600; margin-left:6px;}

  .machine-wrap{
    position:relative;
    display:flex; justify-content:center;
    margin:0 auto;
    max-width:560px;
  }
  #machine-svg{width:100%; height:auto; display:block; overflow:visible;}

  .gear{cursor:pointer;}
  .gear:focus-visible .gear-hit{outline:3px solid var(--steel); outline-offset:2px;}
  /* rotation is driven by the JS gear engine via the SVG transform
     ATTRIBUTE (rotates about the local origin, where each gear's geometry
     is centered — CSS transform-origin on SVG children resolves against
     the viewBox and would pivot wrong). .gear-spin--cw/--ccw are the
     direction markers the engine reads. */

  .gear-teeth{fill:var(--navy); transition:fill .2s;}
  .gear-hub{fill:var(--navy-deep);}
  .gear-rim{fill:none; stroke:var(--brass); stroke-width:2.5; opacity:.85;}
  .gear-bore{fill:none; stroke:var(--brass); stroke-width:1.6; opacity:.55;}
  .gear-scale{transition:transform .3s cubic-bezier(.34,1.56,.64,1); transform-box:fill-box; transform-origin:center;}
  .gear.active .gear-scale{transform:scale(1.16);}
  .gear.active .gear-teeth{fill:var(--steel);}
  .gear.opened .gear-rim{stroke:var(--brass); opacity:1; stroke-width:3.5;}
  .gear-label{
    fill:var(--white); font-weight:800; font-size:15.5px;
    text-anchor:middle; pointer-events:none;
    paint-order:stroke; stroke:var(--navy-deep); stroke-width:3.5px; stroke-linejoin:round;
  }
  .gear-check{
    opacity:0; transition:opacity .25s;
  }
  .gear.opened .gear-check{opacity:1;}
  .gear-hit{fill:transparent;}

  /* mobile grid fallback */
  .gear-grid{display:none; grid-template-columns:1fr 1fr; gap:12px; margin:0 auto; max-width:420px;}
  .gear-chip{
    display:flex; align-items:center; gap:10px;
    background:var(--navy); color:var(--white); border:2px solid var(--brass);
    border-radius:14px; padding:12px 12px; text-align:left; min-height:64px;
  }
  .gear-chip .chip-icon{width:34px; height:34px; flex:none;}
  .gear-chip .chip-icon svg{width:100%; height:100%;}
  .gear-chip-label{font-weight:800; font-size:15.5px; line-height:1.2;}
  .gear-chip.opened{border-color:var(--brass); box-shadow:0 0 0 2px rgba(201,162,39,.5) inset;}
  .gear-chip:focus-visible{outline:3px solid var(--steel); outline-offset:2px;}

  @media (max-width:600px){
    .machine-wrap{display:none;}
    .gear-grid{display:grid;}
  }

  /* ---------- Dim overlay ---------- */
  .dim-overlay{
    position:fixed; inset:0; background:rgba(16,32,60,.45);
    opacity:0; pointer-events:none; transition:opacity .25s;
    z-index:20;
  }
  .stage.card-open .dim-overlay{opacity:1; pointer-events:auto;}
  .stage.card-open .machine-wrap,
  .stage.card-open .gear-grid{opacity:.4; filter:saturate(65%);}

  /* ---------- Card panel ---------- */
  .card-panel{
    position:fixed; left:0; right:0; bottom:0;
    max-width:720px; margin:0 auto;
    background:var(--white);
    border-radius:20px 20px 0 0;
    box-shadow:0 -8px 30px rgba(16,32,60,.28);
    transform:translateY(105%);
    transition:transform .32s cubic-bezier(.25,.9,.35,1);
    z-index:21;
    max-height:min(78vh,680px);
    overflow-y:auto;
    border-top:4px solid var(--brass);
  }
  .stage.card-open .card-panel{transform:translateY(0);}
  .card-inner{padding:22px 20px 28px;}
  .card-topline{display:flex; align-items:flex-start; justify-content:space-between; gap:12px;}
  .card-eyebrow{font-size:11.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--steel); font-weight:800;}
  .card-panel h2{font-size:23px; color:var(--navy); font-weight:800; margin-top:2px;}
  .card-close{
    background:var(--paper); border:1px solid #D7DEE8; color:var(--navy);
    width:38px; height:38px; border-radius:50%; font-size:18px; line-height:1; flex:none;
  }
  .card-close:focus-visible{outline:2px solid var(--steel); outline-offset:2px;}

  .card-hero{
    /* full-bleed: cancel the card-inner side padding so the photo spans
       the entire card width */
    margin:14px -20px 0; border-radius:0; overflow:hidden;
    aspect-ratio:16/9; background:var(--paper);
  }
  .card-hero img{width:100%; height:100%; object-fit:cover;}

  .card-section{margin-top:16px;}
  .card-section .k{
    font-size:11.5px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
    color:var(--slate); margin-bottom:5px; display:flex; align-items:center; gap:8px;
  }
  .card-section p{font-size:15.5px; color:var(--ink);}
  .card-section p.def-text{font-size:19px; font-weight:600; line-height:1.5;}
  .card-section p.spot-text{font-size:18px; line-height:1.5;}
  .picture-row{display:flex; align-items:center; gap:16px;}
  .picture-row .pict-icon{width:120px;height:120px;flex:none; background:var(--paper); border-radius:16px; padding:14px; border:1px solid #E4E9F1;}
  .picture-row .pict-icon svg{width:100%;height:100%;}
  @media (max-width:480px){
    .picture-row .pict-icon{width:96px;height:96px;padding:10px;}
  }

  .confuse-box{
    margin-top:16px; background:var(--paper); border:1px solid #D7DEE8;
    border-left:4px solid var(--brass);
    border-radius:12px; padding:12px 14px; display:flex; gap:10px;
  }
  .confuse-box .flag{font-size:18px; flex:none;}
  .confuse-box p{font-size:18px; line-height:1.5; color:var(--ink);}
  .confuse-box b{color:var(--navy);}

  .term{
    background:none; border:none; padding:0; margin:0; font:inherit;
    color:var(--steel); font-weight:800; text-decoration:underline; text-decoration-style:dotted;
    text-underline-offset:3px; cursor:pointer;
  }
  .term:focus-visible{outline:2px solid var(--steel); outline-offset:2px; border-radius:3px;}

  /* ---------- Federalism sorter ---------- */
  .sorter{margin-top:18px; background:var(--paper); border-radius:14px; padding:14px;}
  .sorter h3{font-size:14.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--navy); font-weight:800;}
  .sorter-sub{font-size:14.5px; color:var(--slate); margin-top:3px;}
  .sorter-tray{
    display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; min-height:40px;
    padding:8px; border:1.5px dashed #C3CCDA; border-radius:10px;
  }
  .sorter-cols{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:10px;}
  .sorter-col{
    background:var(--white); border:1.5px solid #E4E9F1; border-radius:10px;
    padding:8px; min-height:96px;
  }
  .sorter-col h4{font-size:13px; color:var(--navy); font-weight:800; text-align:center; margin-bottom:2px;}
  .sorter-col .hint{font-size:11.5px; color:var(--slate); text-align:center; display:block; margin-bottom:6px;}
  .sorter-col .zone-body{display:flex; flex-direction:column; gap:6px; min-height:44px;}
  .chip{
    display:block; width:100%; text-align:left;
    background:var(--white); border:1.5px solid #C3CCDA; border-radius:8px;
    padding:9px 12px; font-size:15.5px; font-weight:700; color:var(--ink);
  }
  .chip:focus-visible{outline:2px solid var(--steel); outline-offset:2px;}
  .chip.correct{border-color:var(--green); background:#EAF6EE; color:#1E5C36;}
  .chip.incorrect{border-color:var(--crimson); background:#FBEBEC; color:#7C2530;}
  .chip .mark{margin-right:4px; font-weight:900;}

  /* ---------- Match It ---------- */
  .match-panel{max-width:600px; margin:0 auto; padding:4px 4px 4px;}
  .match-card{
    background:var(--white); border-radius:16px; padding:20px;
    border:1.5px solid #E4E9F1; box-shadow:0 2px 10px rgba(16,32,60,.06);
  }
  .match-top{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
  .streak{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--navy); color:var(--white); font-weight:800; font-size:16px;
    padding:8px 16px; border-radius:999px;
  }
  .streak b{color:var(--brass); font-size:20px;}
  .match-instructions{font-size:12.5px; color:var(--slate); font-weight:600;}
  .scenario-text{
    font-size:21px; font-weight:700; color:var(--navy); margin-top:16px; line-height:1.45;
  }
  .match-feedback{
    margin-top:16px; border-radius:12px; padding:13px 14px;
    display:none; gap:8px; align-items:flex-start;
  }
  .match-feedback.show{display:flex;}
  .match-feedback.correct{background:#EAF6EE; border:1.5px solid var(--green);}
  .match-feedback.incorrect{background:#FBEBEC; border:1.5px solid var(--crimson);}
  .match-feedback .mf-icon{font-size:19px; flex:none; line-height:1.3;}
  .match-feedback .mf-title{font-weight:800; font-size:16.5px;}
  .match-feedback.correct .mf-title{color:#1E5C36;}
  .match-feedback.incorrect .mf-title{color:#7C2530;}
  .match-feedback .mf-tip{font-size:16px; color:var(--ink); margin-top:3px;}
  .next-btn{
    margin-top:16px; display:none; width:100%;
    background:var(--navy); color:var(--white); border:none; border-radius:10px;
    padding:13px; font-weight:800; font-size:15px;
  }
  .next-btn.show{display:block;}
  .next-btn:focus-visible{outline:2px solid var(--steel); outline-offset:3px;}
  .match-tap-hint{
    margin-top:14px; font-size:13px; color:var(--steel); font-weight:700;
    text-align:center;
  }

  /* ---------- Money moment ---------- */
  .money-banner{
    position:fixed; left:0; right:0; top:40%;
    display:flex; justify-content:center;
    pointer-events:none; z-index:40;
    opacity:0;
  }
  .money-banner.play{animation:money-fade 6.4s ease forwards;}
  .money-banner span{
    display:inline-block; white-space:nowrap;
    font-size:clamp(22px,5.6vw,40px); font-weight:800; letter-spacing:.02em;
    color:var(--brass);
    text-shadow:0 2px 18px rgba(0,0,0,.35), 0 0 26px rgba(201,162,39,.5);
    transform:translateX(-110vw);
  }
  .money-banner.play span{animation:money-roll 6.4s cubic-bezier(.2,.7,.3,1) forwards;}
  @keyframes money-fade{
    0%{opacity:0;} 6%{opacity:1;} 82%{opacity:1;} 100%{opacity:0;}
  }
  @keyframes money-roll{
    0%{transform:translateX(-110vw);}
    50%{transform:translateX(0);}
    85%{transform:translateX(0);}
    100%{transform:translateX(110vw);}
  }

  /* ---------- Glossary popover ---------- */
  .glossary-pop{
    position:fixed; max-width:290px; background:var(--navy-deep); color:var(--white);
    padding:12px 14px; border-radius:10px; font-size:16px; line-height:1.45;
    box-shadow:0 8px 22px rgba(0,0,0,.3); z-index:60; display:none;
    border:1px solid var(--brass);
  }
  .glossary-pop.show{display:block;}
  .glossary-pop b{color:var(--brass); text-transform:capitalize;}

  /* ---------- Footer ---------- */
  footer{
    text-align:center; padding:26px 16px 34px; color:var(--slate); font-size:15px;
  }

  .sr-only{
    position:absolute; width:1px; height:1px; padding:0; margin:-1px;
    overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }

  @media (max-width:600px){
    .card-panel{
      position:fixed; inset:0; max-width:none; border-radius:0; max-height:none;
      transform:translateY(100%);
    }
    .stage.card-open .card-panel{transform:translateY(0);}
    .sorter-cols{grid-template-columns:1fr; }
  }

  @media (prefers-reduced-motion: reduce){
    .money-banner.play span{animation-duration:.01ms; transform:translateX(0);}
    .card-panel,.gear-scale{transition:none !important;}
  }
</style>
</head>
<body>
<div class="app">

  <header class="hero">
    <img class="hero-photo" id="hero-photo" src="assets/hero-independence-hall.webp" alt="" aria-hidden="true">
    <div class="hero-scrim" aria-hidden="true"></div>
    <div class="hero-inner">
      <div class="hero-eyebrow">Unit 3 &middot; The Constitution</div>
      <h1>The Principles Machine</h1>
      <p class="sub">Seven gears, seven ideas that hold the Constitution together. Click a gear to see it turn.</p>
      <div class="mode-toggle" role="group" aria-label="Choose a mode">
        <button type="button" id="btn-explore" aria-pressed="true">Explore the Machine</button>
        <button type="button" id="btn-match" aria-pressed="false">Match It</button>
      </div>
    </div>
  </header>

  <main class="stage" id="stage">
    <div class="dim-overlay" id="dim-overlay"></div>

    <!-- Explore mode -->
    <div id="explore-view">
      <div class="progress-row" id="progress-row" aria-hidden="true"></div>
      <div class="machine-wrap">
        <svg id="machine-svg" viewBox="0 0 600 600" role="group" aria-label="Seven gears, one per constitutional principle"></svg>
      </div>
      <div class="gear-grid" id="gear-grid"></div>
    </div>

    <!-- Match It mode -->
    <div id="match-view" style="display:none;">
      <div class="machine-wrap">
        <svg id="machine-svg-match" viewBox="0 0 600 600" role="group" aria-label="Seven gears — tap the one that matches the scenario"></svg>
      </div>
      <div class="gear-grid" id="gear-grid-match"></div>

      <div class="match-panel">
        <div class="match-card">
          <div class="match-top">
            <span class="streak">🔥 Streak <b id="streak-count">0</b></span>
            <span class="match-instructions">Tap the gear that matches</span>
          </div>
          <p class="scenario-text" id="scenario-text"></p>
          <p class="match-tap-hint" id="match-tap-hint">👆 Tap a gear above to answer</p>
          <div class="match-feedback" id="match-feedback">
            <span class="mf-icon" id="mf-icon"></span>
            <div>
              <div class="mf-title" id="mf-title"></div>
              <div class="mf-tip" id="mf-tip"></div>
            </div>
          </div>
          <button type="button" class="next-btn" id="next-btn">Next scenario →</button>
        </div>
      </div>
    </div>

    <!-- Card panel (Explore mode) -->
    <div class="card-panel" id="card-panel" role="dialog" aria-modal="false" aria-labelledby="card-title">
      <div class="card-inner" id="card-inner"></div>
    </div>

    <div class="money-banner" id="money-banner"><span>&hellip;a more perfect Union</span></div>
  </main>

  <div aria-live="polite" class="sr-only" id="live-region"></div>

  <footer>Made for 8th Grade U.S. History &middot; TEKS 8.15D, 8.19A, 8.29B</footer>
</div>

<div class="glossary-pop" id="glossary-pop" role="tooltip"></div>

<script>

"use strict";

var GEAR_R = 64;

function ringPos(k){
  var deg = -90 + 60*k;
  var rad = deg*Math.PI/180;
  return { x: CENTER.x + RING_D*Math.cos(rad), y: CENTER.y + RING_D*Math.sin(rad) };
}

function gearToothPath(rOuter, rInner, teeth){
  var d = '';
  var step = 2*Math.PI/teeth;
  for(var i=0;i<teeth;i++){
    var a0 = i*step;
    var a1 = a0 + step*0.15;
    var a2 = a0 + step*0.35;
    var a3 = a0 + step*0.65;
    var a4 = a0 + step*0.85;
    var pts = [
      [a0,rInner],[a1,rInner],[a2,rOuter],[a3,rOuter],[a4,rInner]
    ];
    pts.forEach(function(p){
      var x = Math.cos(p[0])*p[1];
      var y = Math.sin(p[0])*p[1];
      d += (d?'L':'M') + x.toFixed(2) + ' ' + y.toFixed(2) + ' ';
    });
  }
  d += 'Z';
  return d;
}
var TOOTH_PATH = gearToothPath(GEAR_R, GEAR_R*0.80, 11);
var TOOTH_PATH_HUB = gearToothPath(GEAR_R, GEAR_R*0.80, 13);

/* ============================================================
   GEAR MOTION ENGINE — rAF-driven rotation.
   CSS animations restart from 0° whenever the SVGs re-render and
   jump when animation-duration changes; driving the angles from
   JS keeps rotation continuous through re-renders and lets speed
   ease smoothly (hover slow-down, money-moment speed-up).
   Hub (13 teeth) and ring gears (11 teeth) turn at the real
   13:11 mesh ratio, in opposite directions.
   ============================================================ */
var REDUCED_MOTION = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var HUB_DEG_PER_SEC = 360/48;   /* one hub revolution ≈ 48s */
var MESH_RATIO = 13/11;         /* ring gears have fewer teeth → turn faster */
var SLOW_MULT = 0.4, SYNC_MULT = 2.6;
var MOTION = {
  hubAngle:0, ringAngle:0,
  mult:1, target:1,
  engaged:false, synced:false,
  cw:[], ccw:[],
  last:null
};
function refreshSpinNodes(){
  MOTION.cw  = Array.prototype.slice.call(document.querySelectorAll('.gear-spin--cw'));
  MOTION.ccw = Array.prototype.slice.call(document.querySelectorAll('.gear-spin--ccw'));
  applyGearAngles();
}
function applyGearAngles(){
  /* SVG transform ATTRIBUTE, not CSS — attribute rotate() pivots on the
     local (0,0) the gear paths are drawn around */
  var i;
  for(i=0;i<MOTION.cw.length;i++)  MOTION.cw[i].setAttribute('transform','rotate('+MOTION.hubAngle.toFixed(2)+')');
  for(i=0;i<MOTION.ccw.length;i++) MOTION.ccw[i].setAttribute('transform','rotate('+(-MOTION.ringAngle).toFixed(2)+')');
}
function updateMotionTarget(){
  MOTION.target = MOTION.synced ? SYNC_MULT : (MOTION.engaged ? SLOW_MULT : 1);
}
function setEngagedMotion(on){ MOTION.engaged = !!on; updateMotionTarget(); }
function setSyncedMotion(on){ MOTION.synced = !!on; updateMotionTarget(); }
function tickGears(t){
  if(MOTION.last===null) MOTION.last = t;
  var dt = Math.min((t-MOTION.last)/1000, 0.1);
  MOTION.last = t;
  MOTION.mult += (MOTION.target-MOTION.mult)*Math.min(1, dt*4);
  MOTION.hubAngle  = (MOTION.hubAngle  + HUB_DEG_PER_SEC*MOTION.mult*dt) % 360;
  MOTION.ringAngle = (MOTION.ringAngle + HUB_DEG_PER_SEC*MESH_RATIO*MOTION.mult*dt) % 360;
  applyGearAngles();
  requestAnimationFrame(tickGears);
}

function gearMarkup(gear, cx, cy, spinClass, pathD, opened){

  );
}

function wireGearNodes(){

    var id = node.getAttribute('data-gear');
    node.addEventListener('click', function(){ handleGearActivate(id); });

      if(e.key==='Enter' || e.key===' ' || e.key==='Spacebar'){
        e.preventDefault();
        handleGearActivate(id);

    if(node.tagName.toLowerCase()==='g'){
      node.addEventListener('mouseenter', function(){ if(state.mode==='explore' && !state.openGearId) markActive(id); });
      node.addEventListener('mouseleave', function(){ if(!state.openGearId) markActive(null); });
      node.addEventListener('focus', function(){ if(!state.openGearId) markActive(id); });
      node.addEventListener('blur', function(){ if(!state.openGearId) markActive(null); });
    }
  });
}

   FEDERALISM DEEP-TAP SORTER
   ============================================================ */
var sorterState = {};
function renderSorterMarkup(){
  return (
    '<div class="sorter">'+
      '<h3>Power Sorter</h3>'+
      '<p class="sorter-sub">Tap a chip to move it. Where does each power belong?</p>'+
      '<div class="sorter-tray" id="sorter-tray"></div>'+
      '<div class="sorter-cols">'+
        '<div class="sorter-col"><h4>Delegated</h4><span class="hint">national</span><div class="zone-body" data-zone="delegated"></div></div>'+
        '<div class="sorter-col"><h4>Reserved</h4><span class="hint">states</span><div class="zone-body" data-zone="reserved"></div></div>'+
        '<div class="sorter-col"><h4>Concurrent</h4><span class="hint">both</span><div class="zone-body" data-zone="concurrent"></div></div>'+
      '</div>'+
    '</div>'
  );
}

function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}

function wireSorter(){
  sorterState = {};
  SORTER_CHIPS.forEach(function(c){ sorterState[c.id] = 'tray'; });
  var order = shuffle(SORTER_CHIPS.map(function(c){return c.id;}));
  order.forEach(renderChipInZone);
}

function renderChipInZone(chipId){
  var chip = SORTER_CHIPS.filter(function(c){return c.id===chipId;})[0];
  var zone = sorterState[chipId];
  var host = zone==='tray' ? document.getElementById('sorter-tray') : document.querySelector('.zone-body[data-zone="'+zone+'"]');
  var btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'chip';
  btn.setAttribute('data-chip', chipId);
  var placed = zone!=='tray';
  var correct = placed && zone===chip.zone;
  if(placed) btn.classList.add(correct ? 'correct' : 'incorrect');
  btn.innerHTML = (placed ? '<span class="mark">'+(correct?'✓':'✗')+'</span>' : '') + esc(chip.label);
  btn.setAttribute('aria-label', chip.label + (placed ? (correct? ' — correctly placed in '+zone : ' — placed in '+zone+', try again') : ' — not yet sorted'));
  btn.addEventListener('click', function(){ cycleChip(chipId); });
  host.appendChild(btn);
}

var ZONE_CYCLE = ['tray','delegated','reserved','concurrent'];
function cycleChip(chipId){
  var cur = sorterState[chipId];
  var idx = ZONE_CYCLE.indexOf(cur);
  var next = ZONE_CYCLE[(idx+1) % ZONE_CYCLE.length];
  sorterState[chipId] = next;
  var oldBtn = document.querySelector('.chip[data-chip="'+chipId+'"]');
  if(oldBtn) oldBtn.remove();
  renderChipInZone(chipId);
}

      showGlossary(btn);
    });
  });
}
function showGlossary(btn){
  var key = btn.getAttribute('data-term');
  var pop = document.getElementById('glossary-pop');
  if(pop.classList.contains('show') && pop._forBtn===btn){
    hideGlossary(); return;
  }
  pop.innerHTML = '<b>'+key+':</b> '+GLOSSARY[key];
  pop.classList.add('show');
  pop._forBtn = btn;
  var r = btn.getBoundingClientRect();
  var vw = window.innerWidth || document.documentElement.clientWidth || 320;
  var vh = window.innerHeight || document.documentElement.clientHeight || 640;
  var top = r.bottom + 8;
  var maxLeft = Math.max(8, vw-298); /* 290px max-width + 8px margin */
  var left = Math.min(Math.max(8, r.left), maxLeft);
  if(top + 120 > vh) top = Math.max(8, r.top - 126);
  pop.style.top = top+'px';
  pop.style.left = left+'px';
}
function hideGlossary(){
  var pop = document.getElementById('glossary-pop');
  pop.classList.remove('show');
  pop._forBtn = null;
}
document.addEventListener('click', function(e){
  var pop = document.getElementById('glossary-pop');
  if(pop.classList.contains('show') && !pop.contains(e.target) && !e.target.classList.contains('term')){
    hideGlossary();
  }
});

/* ============================================================
   MONEY MOMENT
   ============================================================ */
function playMoneyMoment(){
  setSyncedMotion(true);
  var banner = document.getElementById('money-banner');
  banner.classList.remove('play'); void banner.offsetWidth;
  banner.classList.add('play');
  announce('All seven gears explored. …a more perfect Union.');
  setTimeout(function(){
    setSyncedMotion(false);
    banner.classList.remove('play');
  }, 6600);
}

/* ============================================================
   MODE TOGGLE
   ============================================================ */
document.getElementById('btn-explore').addEventListener('click', function(){ setMode('explore'); });
document.getElementById('btn-match').addEventListener('click', function(){ setMode('match'); });

function setMode(mode){
  if(state.mode===mode) return;
  if(document.getElementById('stage').classList.contains('card-open')) closeCard();
  state.mode = mode;
  document.getElementById('btn-explore').setAttribute('aria-pressed', String(mode==='explore'));
  document.getElementById('btn-match').setAttribute('aria-pressed', String(mode==='match'));
  document.getElementById('explore-view').style.display = mode==='explore' ? '' : 'none';
  document.getElementById('match-view').style.display = mode==='match' ? '' : 'none';
  if(mode==='match'){
    state.matchStreak = 0;
    state.matchQueue = shuffle(SCENARIOS.map(function(s,i){return i;}));
    state.matchPos = 0;
    updateStreakUI();
    showScenario();
  } else {
    markActive(null);
  }
}

/* ============================================================
   MATCH IT
   ============================================================ */
function showScenario(){
  if(state.matchPos >= state.matchQueue.length){
    state.matchQueue = shuffle(SCENARIOS.map(function(s,i){return i;}));
    state.matchPos = 0;
  }
  var idx = state.matchQueue[state.matchPos];
  var scenario = SCENARIOS[idx];
  document.getElementById('scenario-text').textContent = scenario.text;
  document.getElementById('match-feedback').className = 'match-feedback';
  document.getElementById('next-btn').className = 'next-btn';
  document.getElementById('match-tap-hint').style.display = '';
  state.matchAnswered = false;
  markActive(null);
}

function answerScenario(gearId){
  if(state.matchAnswered) return;
  state.matchAnswered = true;
  state.matchTotalAnswered++;
  var idx = state.matchQueue[state.matchPos];
  var scenario = SCENARIOS[idx];
  var correct = gearId === scenario.answer;
  document.getElementById('match-tap-hint').style.display = 'none';

  var fb = document.getElementById('match-feedback');
  var icon = document.getElementById('mf-icon');
  var title = document.getElementById('mf-title');
  var tip = document.getElementById('mf-tip');

  if(correct){
    state.matchStreak++;
    fb.className = 'match-feedback show correct';
    icon.textContent = '✅';
    title.textContent = 'Yes! ' + GEAR_BY_ID[scenario.answer].name;
    tip.textContent = scenario.tip;
    markActive(gearId);
    flashGear(gearId, true);
    announce('Correct. '+GEAR_BY_ID[scenario.answer].name+'. Streak '+state.matchStreak+'.');
  } else {
    state.matchStreak = 0;
    fb.className = 'match-feedback show incorrect';
    icon.textContent = '❌';
    title.textContent = 'Not quite — that’s ' + GEAR_BY_ID[scenario.answer].name;
    tip.textContent = scenario.tip;
    flashGear(gearId, false);
    flashGear(scenario.answer, true);
    announce('Not quite. The answer is '+GEAR_BY_ID[scenario.answer].name+'. '+scenario.tip);
  }
  updateStreakUI();
  document.getElementById('next-btn').className = 'next-btn show';
}

function flashGear(id, isCorrect){
  document.querySelectorAll('[data-gear="'+id+'"]').forEach(function(node){
    node.classList.add(isCorrect ? 'flash-correct' : 'flash-incorrect');
    var teeth = node.querySelector ? node.querySelector('.gear-teeth') : null;
    if(teeth) teeth.style.fill = isCorrect ? '#2F7D4F' : '#B23A48';
    if(node.classList.contains('gear-chip')) node.style.borderColor = isCorrect ? '#2F7D4F' : '#B23A48';
    setTimeout(function(){
      if(teeth) teeth.style.fill = '';
      if(node.classList && node.classList.contains('gear-chip')) node.style.borderColor = '';
      node.classList.remove('flash-correct','flash-incorrect');
    }, 1400);
  });
}

function updateStreakUI(){
  document.getElementById('streak-count').textContent = state.matchStreak;
}

document.getElementById('next-btn').addEventListener('click', function(){
  state.matchPos++;
  showScenario();
});

function announce(msg){
  document.getElementById('live-region').textContent = msg;
}

/* ============================================================
   HERO IMAGE FALLBACK — hide gracefully if asset missing
   ============================================================ */
function wireImageFallbacks(){
  document.querySelectorAll('img').forEach(function(img){
    img.addEventListener('error', function(){
      var wrap = img.closest('.card-hero');
      if(wrap) wrap.style.display='none';
      if(img.id==='hero-photo') img.style.display='none';
    });
  });
}

/* ============================================================
   INIT
   ============================================================ */
renderMachines();
renderProgress();
wireImageFallbacks();
document.getElementById('card-panel').addEventListener('scroll', hideGlossary, {passive:true});
if(!REDUCED_MOTION) requestAnimationFrame(tickGears);
window.__pm = {motion:MOTION, state:state}; /* QA/debug handle */

})();
</script>
